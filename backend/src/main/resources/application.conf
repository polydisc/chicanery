api {
  host = "0.0.0.0"
  port = 8080
}

database {
  url = "jdbc:postgresql://localhost:5432/backend_db"
  user = "postgres"
  password = "postgres"
  max-pool-size = 10
  schema = "public"
}

jwt {
  # HMAC-SHA256 signing secret. Override in every real environment.
  secret = "dev-only-change-me-please-use-a-long-random-secret"
  secret = ${?JWT_SECRET}
  expiry-minutes = 60
}

cors {
  # Origins allowed to call the API from a browser. The Next.js dev server runs
  # on :3000. Edit this HOCON list to add deployed origins; a single "*" allows
  # any origin.
  allowed-origins = ["http://localhost:3000"]
}
